version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 30
      semver-major-days: 60
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 30
      semver-major-days: 60
    open-pull-requests-limit: 3

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 30
      semver-major-days: 60

  - package-ecosystem: docker
    directory: /docker
    schedule:
      interval: weekly
    cooldown:
      default-days: 30
      semver-major-days: 60

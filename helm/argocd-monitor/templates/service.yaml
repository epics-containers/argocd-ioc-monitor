apiVersion: v1
kind: Service
metadata:
  name: {{ include "argocd-monitor.fullname" . }}
  labels:
    {{- include "argocd-monitor.labels" . | nindent 4 }}
spec:
  type: {{ if .Values.ingress.enabled }}ClusterIP{{ else }}LoadBalancer{{ end }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "argocd-monitor.selectorLabels" . | nindent 4 }}

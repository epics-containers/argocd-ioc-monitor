apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "argocd-monitor.fullname" . }}-nginx
  labels:
    {{- include "argocd-monitor.labels" . | nindent 4 }}
data:
  {{- if .Values.namespaceMap.enabled }}
  # Loaded by nginx's `include /etc/nginx/conf.d/*.conf;` so the geo block sits
  # at http context (sibling of server{}). $beamline_namespace is then visible
  # to every server{} in default.conf.
  geo.conf: |
    geo $beamline_namespace {
        default "";
        {{- range .Values.namespaceMap.ranges }}
        {{ .cidr }} "{{ .namespace }}";
        {{- end }}
    }
  {{- end }}
  default.conf: |
    server {
        listen 8080;
        root /usr/share/nginx/html;
        index index.html;
        {{- if .Values.namespaceMap.enabled }}

        # Recover the real client IP from X-Forwarded-For so $remote_addr (and
        # therefore the geo lookup) reflect the user, not the ingress/oauth2-proxy.
        {{- range .Values.namespaceMap.trustedProxies }}
        set_real_ip_from {{ . }};
        {{- end }}
        real_ip_header X-Forwarded-For;
        real_ip_recursive on;
        {{- end }}

        # Auth mode endpoint — lets the frontend know which auth mode is active
        location = /api/auth-mode {
            default_type application/json;
            {{- if .Values.argocd.anonymous.enabled }}
            return 200 '{"mode":"anonymous"}';
            {{- else if .Values.oauth2Proxy.enabled }}
            return 200 '{"mode":"oauth2-proxy"}';
            {{- else }}
            return 200 '{"mode":"manual"}';
            {{- end }}
        }

        {{- if .Values.oauth2Proxy.enabled }}
        # User info from oauth2-proxy headers (ArgoCD's userinfo doesn't work with Bearer tokens)
        location = /api/oauth2/userinfo {
            default_type application/json;
            return 200 '{"loggedIn":true,"username":"$http_x_forwarded_preferred_username","email":"$http_x_forwarded_email"}';
        }
        {{- end }}

        # Client IP — exposes $remote_addr and X-Forwarded-For so the frontend can
        # pick the original client IP behind any forwarding layer.
        location = /api/client-ip {
            default_type application/json;
            return 200 '{"ip":"$remote_addr","forwardedFor":"$http_x_forwarded_for"}';
        }

        # Resolved beamline namespace for the requesting client IP. When the
        # namespaceMap is disabled or no range matches, returns an empty string
        # and the frontend skips auto-filtering.
        location = /api/beamline {
            default_type application/json;
            {{- if .Values.namespaceMap.enabled }}
            return 200 '{"namespace":"$beamline_namespace"}';
            {{- else }}
            return 200 '{"namespace":""}';
            {{- end }}
        }

        # Dedicated location for log streaming — must be above /api/ catch-all
        location ~ ^/api/v1/applications/[^/]+/logs {
            proxy_pass {{ .Values.argocd.url }};
            proxy_ssl_verify off;
            proxy_ssl_server_name on;
            proxy_set_header Host {{ .Values.argocd.url | trimPrefix "https://" | trimPrefix "http://" }};
            proxy_set_header Accept-Encoding identity;
            proxy_set_header Cookie $http_cookie;
            {{- if .Values.oauth2Proxy.enabled }}
            proxy_set_header Authorization $http_authorization;
            {{- end }}
            proxy_pass_header Set-Cookie;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            gzip off;
            proxy_read_timeout 3600s;
            add_header Content-Type text/event-stream always;
            add_header X-Accel-Buffering no always;
        }

        location /api/ {
            proxy_pass {{ .Values.argocd.url }}/api/;
            proxy_ssl_verify off;
            proxy_ssl_server_name on;
            proxy_set_header Host {{ .Values.argocd.url | trimPrefix "https://" | trimPrefix "http://" }};
            proxy_set_header Accept-Encoding identity;
            proxy_set_header Cookie $http_cookie;
            {{- if .Values.oauth2Proxy.enabled }}
            proxy_set_header Authorization $http_authorization;
            {{- end }}
            proxy_pass_header Set-Cookie;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
        }

        location /login {
            proxy_pass {{ .Values.argocd.url }}/login;
            proxy_ssl_verify off;
            proxy_ssl_server_name on;
            proxy_set_header Host {{ .Values.argocd.url | trimPrefix "https://" | trimPrefix "http://" }};
            proxy_set_header Cookie $http_cookie;
            proxy_pass_header Set-Cookie;
        }

        location /auth/ {
            proxy_pass {{ .Values.argocd.url }}/auth/;
            proxy_ssl_verify off;
            proxy_ssl_server_name on;
            proxy_set_header Host {{ .Values.argocd.url | trimPrefix "https://" | trimPrefix "http://" }};
            proxy_set_header Cookie $http_cookie;
            proxy_pass_header Set-Cookie;
        }

        location = /healthz {
            access_log off;
            return 200 "ok";
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
